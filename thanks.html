<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Softgrain Audio | Request sent</title>
    <link rel="icon" type="image/svg+xml" href="./public/favicon.svg" />
    <link rel="stylesheet" href="./app/globals.css" />
    <style>
      .result-section.cta-section {
        min-height: 72vh;
        display: grid;
        grid-template-columns: 1fr;
        place-items: center;
        text-align: center;
      }

      .result-card {
        width: min(100%, 680px);
        margin: 0 auto;
        display: grid;
        justify-items: center;
        gap: 18px;
        text-align: center;
      }

      .result-card h1,
      .result-card p {
        margin-inline: auto;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="cta-section section-shell section-block result-section">
        <div class="result-card">
          <p class="eyebrow">Softgrain Audio</p>
          <h1 id="result-title">Request recorded.</h1>
          <p id="result-message">Thanks. Your brief was recorded and your reference files were uploaded.</p>
          <p class="result-id" id="result-id"></p>
          <a class="button button-primary" href="./index.html">Back to site</a>
        </div>
      </section>
    </main>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const status = params.get("status");
        const message = params.get("message");
        const title = document.querySelector("#result-title");
        const text = document.querySelector("#result-message");
        const resultId = document.querySelector("#result-id");

        if (params.get("id")) {
          resultId.textContent = `Request ID: ${params.get("id")}`;
        }

        if (status === "error") {
          title.textContent = "Something went wrong.";
          text.textContent = message || "The message could not be sent. Please try again.";
          resultId.textContent = "";
        } else if (params.get("email") === "sent") {
          title.textContent = "Request received.";
          text.textContent = "Thanks. Your brief was sent successfully and your reference files were uploaded.";
        } else if (params.get("email") === "recorded") {
          title.textContent = "Request recorded.";
          text.textContent = "Your brief and files were stored, but the email notification needs SMTP configuration on the server.";
        }
      })();
    </script>
  </body>
</html>
